name: cardano_flutter_rs_example
description: Example Flutter app demonstrating cardano_flutter_rs FFI bridge.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cardano_flutter_rs:
    path: ../dart
  flutter_lints: ^6.0.0
  # CIP-45 reference transport: hosts bugout.min.js (WebTorrent+WebRTC) in a
  # headless WebView, and handles web+cardano:// deep links.
  flutter_inappwebview: ^6.1.5
  app_links: ^6.3.2
  # Phase 4.5 hardware wallets: Ledger over BLE/USB + the Cardano Ledger app
  # APDU protocol (Vespr's MIT-licensed libs). Used only in the example to back
  # the HardwareWallet adapter; the core SDK stays free of device transports.
  ledger_cardano_plus: ^0.5.9
  permission_handler: ^11.3.1
  # In-wallet QR scanning of CIP-45 web+cardano:// connection URIs (example only).
  mobile_scanner: ^5.2.3
  # Native (no-WebView) CIP-45 transport scaffold: WebRTC peer connection + data
  # channel. The WebTorrent-tracker discovery + bugout NaCl/bencode framing are
  # provided via pluggable seams (see lib/cip45_webrtc_transport.dart).
  flutter_webrtc: ^0.11.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/cip45/
