name: cardano_flutter_rs_example
description: Example Flutter app demonstrating cardano_flutter_rs FFI bridge.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  cardano_flutter_rs:
    path: ../dart
  flutter_lints: ^6.0.0
  # CIP-45 reference transport: hosts bugout.min.js (WebTorrent+WebRTC) in a
  # headless WebView, and handles web+cardano:// deep links.
  flutter_inappwebview: ^6.1.5
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/cip45/
