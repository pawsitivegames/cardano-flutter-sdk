name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  # Single source of truth for the Flutter version CI runs.
  FLUTTER_VERSION: '3.19.0'

jobs:
  rust-tests:
    runs-on: ubuntu-latest
    name: Rust Tests & Lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Run Rust tests
        run: cd rust && cargo test --verbose
      - name: Run Rust linter
        run: cd rust && cargo clippy --all-targets -- -D warnings
      - name: Check Rust formatting
        run: cd rust && cargo fmt --check

  dart-tests:
    runs-on: ubuntu-latest
    name: Dart Analysis & Tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      # The widget/unit tests load the Rust FFI bridge. The FRB loader resolves
      # the lib from rust/target/release with stem `cardano_flutter_rs`, and the
      # dylib's embedded content hash must match frb_generated.dart. Build it
      # (debug is fine — same ABI) and place it where the loader looks.
      - name: Build Rust bridge lib for tests
        run: |
          cd rust && cargo build --lib
          mkdir -p target/release
          cp target/debug/libcardano_flutter_rs.so target/release/libcardano_flutter_rs.so
      - name: Get Dart dependencies
        run: |
          cd dart && flutter pub get
          cd ../example && flutter pub get
      # Gate on the publishable library package (dart/). The example app carries
      # pre-existing lint nits tracked separately; analyze it non-blocking.
      - name: Analyze Dart library
        run: cd dart && flutter analyze
      - name: Analyze example (non-blocking)
        run: cd example && flutter analyze
        continue-on-error: true
      # Real gate: a failing unit test fails CI (no continue-on-error).
      - name: Run Dart unit tests
        run: cd dart && flutter test
      # Live testnet integration only runs when the Blockfrost secret is present;
      # it must not fail forks/PRs without the secret, so it stays non-blocking.
      - name: Run integration tests (live testnet, only if secret present)
        if: ${{ env.BLOCKFROST_PROJECT_ID != '' }}
        run: cd example && flutter test integration_test/send_flow_test.dart
        env:
          BLOCKFROST_PROJECT_ID: ${{ secrets.BLOCKFROST_PROJECT_ID }}

  ios-build:
    runs-on: macos-latest
    name: iOS Build
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup Rust iOS targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - name: Build iOS example (no codesign)
        run: cd example && flutter build ios --release --no-codesign

  macos-build:
    runs-on: macos-latest
    name: macOS Build
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup Rust macOS targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      # macOS desktop plugin scaffolding lands in Phase 6. Until example/macos
      # exists this job is informational (does not gate). Re-enable as a hard
      # gate once the macOS plugin (universal dylib + podspec + entitlements) ships.
      - name: Build macOS example
        run: |
          if [ -d example/macos ]; then
            cd example && flutter build macos --release
          else
            echo "example/macos not scaffolded yet (Phase 6) — skipping."
          fi

  android-build:
    runs-on: ubuntu-latest
    name: Android Build
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Setup Rust Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android
      # Android is emulator-verified pre-1.0 and physical-device-verified for 1.0
      # (see docs/PLAN.md). This compile check is informational until the NDK r28+
      # / 16KB-page-size build is wired; it does not gate the RC.
      - name: Build Android example
        run: cd example && flutter build apk --release
        continue-on-error: true

  summary:
    runs-on: ubuntu-latest
    needs: [ rust-tests, dart-tests, ios-build, macos-build ]
    if: always()
    name: CI Summary
    steps:
      - name: Check gating jobs
        run: |
          fail=0
          for job in rust-tests dart-tests ios-build macos-build; do :; done
          if [ "${{ needs.rust-tests.result }}" != "success" ]; then echo "rust-tests failed"; fail=1; fi
          if [ "${{ needs.dart-tests.result }}" != "success" ]; then echo "dart-tests failed"; fail=1; fi
          if [ "${{ needs.ios-build.result }}" != "success" ]; then echo "ios-build failed"; fail=1; fi
          if [ "${{ needs.macos-build.result }}" != "success" ]; then echo "macos-build failed"; fail=1; fi
          if [ "$fail" -ne 0 ]; then echo "Gating CI checks failed"; exit 1; fi
          echo "All gating CI checks passed"
