name: cardano_flutter_rs
description: >-
  Production-grade Cardano SDK for Flutter. Thin Dart API over flutter_rust_bridge
  → Rust → cardano-serialization-lib (CSL). Native via Rust FFI; web via CML JS interop.
version: 0.12.0
homepage: https://github.com/pawsitivegames/cardano-flutter-sdk
repository: https://github.com/pawsitivegames/cardano-flutter-sdk

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0 # pinned — must match rust/Cargo.toml (FRB content-hash check)
  ffi: ^2.1.0
  meta: ^1.10.0
  freezed_annotation: ^3.1.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.2.0
  freezed: ^3.2.5
  mockito: ^5.4.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
      linux:
        ffiPlugin: true
      macos:
        ffiPlugin: true
      windows:
        ffiPlugin: true
