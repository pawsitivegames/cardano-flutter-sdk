<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CmlWebBackend in-browser conformance</title>
  <style>
    body { font: 14px/1.5 ui-monospace, monospace; padding: 1.5rem; }
    #out { white-space: pre-wrap; }
    .pass { color: #0a0; } .fail { color: #c00; }
  </style>
</head>
<body>
  <h1>CmlWebBackend ↔ golden CBOR (live CML WASM)</h1>
  <div id="out">running…</div>

  <!-- golden vectors + entropy bridge -->
  <script src="data.js"></script>

  <!-- Instantiate the CML + message-signing browser WASM builds onto globalThis,
       then run the dart2js-compiled harness. wasm-bindgen bundler-target output
       is wired up by manual instantiation (no bundler). -->
  <script type="module">
    async function instantiate(bgUrl, wasmUrl, globalName) {
      const bg = await import(bgUrl);
      const importObject = { [bgUrl]: bg };
      // The wasm declares its import module as a relative specifier; map every
      // declared import module to the `_bg.js` namespace we just imported.
      const resp = await fetch(wasmUrl);
      const bytes = await resp.arrayBuffer();
      const module = await WebAssembly.compile(bytes);
      const imports = {};
      for (const imp of WebAssembly.Module.imports(module)) {
        imports[imp.module] = bg;
      }
      const instance = await WebAssembly.instantiate(module, imports);
      bg.__wbg_set_wasm(instance.exports);
      // Some builds export an init/start; wasm-bindgen bundler target does not.
      globalThis[globalName] = bg;
    }

    const out = document.getElementById('out');
    try {
      await instantiate('./cml_bg.js', './cml_bg.wasm', 'CML');
      await instantiate('./ms_bg.js', './ms_bg.wasm', 'MS');

      // Load the compiled Dart harness; its main() runs on load and sets
      // globalThis.CONFORMANCE_RESULT.
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = './harness.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('failed to load harness.js'));
        document.head.appendChild(s);
      });

      const result = String(globalThis.CONFORMANCE_RESULT);
      out.textContent = result;
      out.className = /\bFAIL 0\b/.test(result) ? 'pass' : 'fail';
      globalThis.HARNESS_DONE = true;
    } catch (e) {
      out.textContent = 'HARNESS ERROR: ' + (e && e.stack || e);
      out.className = 'fail';
      globalThis.CONFORMANCE_RESULT = 'HARNESS ERROR: ' + e;
      globalThis.HARNESS_DONE = true;
    }
  </script>
</body>
</html>
